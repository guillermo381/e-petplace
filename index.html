<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bienvenido a e-PetPlace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: linear-gradient(135deg, #fbeee6 0%, #b5dfff 100%);
      min-height: 100vh;
      margin: 0;
      font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card {
      background: #fff;
      padding: 2.5rem 2rem;
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(60, 90, 120, 0.10), 0 2px 8px rgba(245, 137, 87, 0.05);
      max-width: 370px;
      width: 100%;
      text-align: center;
      border: 1px solid #f6c390;
    }
    h1 {
      color: #f57c2e;
      margin-bottom: 0.7em;
      font-size: 2.2em;
      letter-spacing: 1px;
    }
    h2 {
      color: #2097df;
      margin-top: 0;
      font-weight: 500;
      font-size: 1.35em;
      letter-spacing: 0.5px;
    }
    .premio-btn {
      margin-top: 1.3em;
      background-color: #f57c2e;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.14em;
      font-weight: 500;
      padding: 0.72em 2em;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(245, 137, 87, 0.10);
      transition: background 0.2s, transform 0.1s;
      outline: none;
    }
    .premio-btn:hover, .premio-btn:focus {
      background-color: #f6c390;
      color: #f57c2e;
      transform: translateY(-1px) scale(1.025);
    }
    .contador-premios {
      font-size: 1em;
      font-weight: 500;
      color: #2097df;
      margin-top: 1.2em;
      min-height: 1.3em;
      transition: color 0.3s;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Bienvenido a e-PetPlace</h1>
    <h2>El perfil de tu mascota</h2>
    <button id="btn-premio" class="premio-btn">Dar Premio 🦴</button>
    <div id="premio-contador" class="contador-premios"></div>
  </div>
  <script>
    let contador = 0;
    const btnPremio = document.getElementById('btn-premio');
    const premioContador = document.getElementById('premio-contador');

    function actualizarContador() {
      premioContador.textContent = contador === 0 
        ? ""
        : `¡Has dado ${contador} premio${contador > 1 ? 's' : ''} a tu mascota!`;
    }

    btnPremio.addEventListener('click', () => {
      contador++;
      actualizarContador();
    });

    actualizarContador();
  </script>
</body>
</html>
